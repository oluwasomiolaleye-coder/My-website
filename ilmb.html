<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #001f5c;
    }

    /* Animated blue screensaver background */
    .bubble {
        position: absolute;
        bottom: -150px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        animation: float 15s infinite ease-in;
    }

    @keyframes float {
        0% {
            transform: translateY(0) translateX(0);
            opacity: 0;
        }

        50% {
            opacity: 1;
        }

        100% {
            transform: translateY(-120vh) translateX(100px);
            opacity: 0;
        }
    }

    .message {
        position: relative;
        color: white;
        text-align: center;
        z-index: 10;
        text-shadow: 0 0 20px #00aaff;
    }

    .message h1 {
        font-size: 5rem;
        animation: glow 2s infinite alternate;
    }

    .message p {
        margin-top: 15px;
        font-size: 1.5rem;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 20px #00aaff;
        }

        to {
            text-shadow: 
                0 0 30px #00d5ff,
                0 0 50px #00d5ff;
        }
    }
</style>
</head>

<body>

<div class="message">
    <h1>I Love You ❤️</h1>
    <p>Forever and always</p>
</div>

<script>
    // Create floating bubbles
    for (let i = 0; i < 50; i++) {
        let bubble = document.createElement("div");
        bubble.classList.add("bubble");

        let size = Math.random() * 80 + 20;

        bubble.style.width = size + "px";
        bubble.style.height = size + "px";
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.animationDuration =
            Math.random() * 10 + 8 + "s";
        bubble.style.animationDelay =
            Math.random() * 5 + "s";

        document.body.appendChild(bubble);
    }
</script>

</body>
</html>
